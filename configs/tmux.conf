# --- Terminal ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Change prefix from C-b to C-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Faster escape sequences
set -sg escape-time 0

# Increase scrollback
set -g history-limit 100000

# Start windows/panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically
set -g renumber-windows on

# Enable mouse
set -g mouse on

# Easier reload
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Split panes using | and -
bind | split-window -h
bind - split-window -v

# Open panes in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Alt + hjkl
bind -r M-h resize-pane -L 5
bind -r M-j resize-pane -D 5
bind -r M-k resize-pane -U 5
bind -r M-l resize-pane -R 5

# Copy mode uses vim keys
setw -g mode-keys vi

# Better copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Status bar
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 100

set -g status-left "#[fg=green]#S "
set -g status-right "#[fg=yellow]%Y-%m-%d #[fg=cyan]%H:%M"

# Pane borders
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=green

# Window style
setw -g window-status-current-style fg=black,bg=green,bold

# Better colors
set -g status-style bg=default

# Vi copy to system clipboard (Linux/macOS)
# macOS:
# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Linux (xclip):
# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"

# Linux Wayland:
# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'


run '~/.tmux/plugins/tpm/tpm'

